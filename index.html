<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسعار الذهب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #111827, #1f2937);
    margin: 0;
    padding: 20px;
    color: white;
}

h1 {
    text-align: center;
    color: gold;
}

.section-title {
    margin-top: 25px;
    font-size: 20px;
    color: #fbbf24;
    border-bottom: 2px solid #fbbf24;
    padding-bottom: 5px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 15px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(255,215,0,0.3);
}

.card-title {
    color: #facc15;
    font-weight: bold;
    margin-bottom: 10px;
}

.price {
    font-size: 18px;
}

.sell { color: #22c55e; }
.buy { color: #ef4444; }

.footer {
    text-align: center;
    margin-top: 40px;
    opacity: 0.7;
    color: #fbbf24;
}
</style>
</head>

<body>

<h1>💰 أسعار الذهب لحظيًا</h1>

<div class="section-title">الذهب</div>
<div class="container" id="gold"></div>

<div class="section-title">العملات</div>
<div class="container" id="currency"></div>

<script>
async function fetchPrices() {
    try {
        const res = await fetch('/api/prices');
        const data = await res.json();

        const gold = document.getElementById("gold");
        const currency = document.getElementById("currency");

        gold.innerHTML = "";
        currency.innerHTML = "";

        for (const [key, value] of Object.entries(data)) {
            const card = document.createElement("div");
            card.className = "card";

            if (typeof value === "object") {
                card.innerHTML = `
                    <div class="card-title">${key}</div>
                    <div class="price sell">بيع: ${value.بيع}</div>
                    <div class="price buy">شراء: ${value.شراء}</div>
                `;
                gold.appendChild(card);
